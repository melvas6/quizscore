<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INIGO QUIZ</title>
    <link href="https://fonts.googleapis.com/css?family=Archivo:400,400i,600,700,700i" rel="stylesheet">
    <link href="quizbowl.css" type="text/css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.8.0/firebase-firestore.js"></script>
    <script src="db.js"></script>
    <script src="quizbowl.js"></script>
</head>
<body>
<main>
    <div class="group-card">
        <input type="text" placeholder="Team 1" class="team-name" data-team="team1">
        <span id="team1" class="score">0</span>
        <nav class="edit-controls">
            <em data-value="20">+20</em>
            <em data-value="10">+10</em>
            <em data-value="5">+5</em>
            <em data-value="1">+1</em>
            <em data-value="-10">-10</em>
            <em data-value="-5">-5</em>
        </nav>
    </div>
    <div class="group-card">
        <input type="text" placeholder="Team 2" class="team-name" data-team="team2">
        <span id="team2" class="score">0</span>
        <nav class="edit-controls">
            <em data-value="20">+20</em>
            <em data-value="10">+10</em>
            <em data-value="5">+5</em>
            <em data-value="1">+1</em>
            <em data-value="-10">-10</em>
            <em data-value="-5">-5</em>
        </nav>
    </div>
    <div class="group-card">
        <input type="text" placeholder="Team 3" class="team-name" data-team="team3">
        <span id="team3" class="score">0</span>
        <nav class="edit-controls">
            <em data-value="20">+20</em>
            <em data-value="10">+10</em>
            <em data-value="5">+5</em>
            <em data-value="1">+1</em>
            <em data-value="-10">-10</em>
            <em data-value="-5">-5</em>
        </nav>
    </div>
    <div class="group-card">
        <input type="text" placeholder="Team 4" class="team-name" data-team="team4">
        <span id="team4" class="score">0</span>
        <nav class="edit-controls">
            <em data-value="20">+20</em>
            <em data-value="10">+10</em>
            <em data-value="5">+5</em>
            <em data-value="1">+1</em>
            <em data-value="-10">-10</em>
            <em data-value="-5">-5</em>
        </nav>
    </div>
</main>
<button id="unlock-btn" class="unlock-btn">Unlock</button>
</body>
</html>
